version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install bun (same as local dev)
        - curl -fsSL https://bun.sh/install | bash
        - export BUN_INSTALL="$HOME/.bun"
        - export PATH="$BUN_INSTALL/bin:$PATH"
        - bun install
    build:
      commands:
        - export PATH="$HOME/.bun/bin:$PATH"
        # VITE_API_URL must be set in Amplify console environment variables
        # e.g. VITE_API_URL=https://<your-alb-dns>/api
        - bun run build
  artifacts:
    # Tell Amplify where Vite outputs the build
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .bun/**/*

# SPA redirect: all paths → index.html so React Router works
customHeaders:
  - pattern: "**/*"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=0, must-revalidate"
  - pattern: "assets/**"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"
